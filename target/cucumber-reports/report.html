window.CUCUMBER_MESSAGES = [{"meta":{"protocolVersion":"24.1.0","implementation":{"name":"cucumber-jvm","version":"7.18.0"},"runtime":{"name":"OpenJDK 64-Bit Server VM","version":"21.0.5+11-LTS"},"os":{"name":"Mac OS X"},"cpu":{"name":"aarch64"}}},{"testRunStarted":{"timestamp":{"seconds":1771193718,"nanos":233274000}}},{"source":{"uri":"classpath:features/document-type/document-type.feature","data":"Feature: Document Type Management\n  As a hotel/hostel staff member\n  I want to manage document types for guest identification\n  So that I can properly validate and store guest identification documents\n\n  Background:\n    Given the system is running\n    And the database is clean\n\n  Scenario: List all document types\n    Given the following document types exist in the system:\n      | code     | name              | description                    | validationRegex  | active |\n      | PASSPORT | Passport          | International travel document | ^[A-Z]{1,3}[0-9]{6,9}$ | true   |\n      | DNI      | National ID       | National identification card   | ^[0-9]{7,10}$    | true   |\n      | LICENSE  | Driver License    | Driving license document       | ^[A-Z0-9]{8,12}$ | true   |\n      | CEDULA   | Cédula            | Latin American ID card         | ^[0-9]{8,11}$    | true   |\n      | OLDID    | Deprecated ID     | Old identification type        | ^[0-9]{6}$       | false  |\n    When I request all document types\n    Then I should receive 5 document types\n    And the document types should include:\n      | code     | name              | active |\n      | PASSPORT | Passport          | true   |\n      | DNI      | National ID       | true   |\n      | LICENSE  | Driver License    | true   |\n      | CEDULA   | Cédula            | true   |\n      | OLDID    | Deprecated ID     | false  |\n    And each document type should have the required fields:\n      | field            |\n      | code             |\n      | name             |\n      | description      |\n      | validationRegex  |\n      | active           |\n\n  Scenario: List only active document types\n    Given the following document types exist in the system:\n      | code     | name              | active |\n      | PASSPORT | Passport          | true   |\n      | DNI      | National ID       | true   |\n      | OLDID    | Deprecated ID     | false  |\n    When I request only active document types\n    Then I should receive 2 document types\n    And all returned document types should be active\n    And the active document types should be:\n      | code     | name              |\n      | PASSPORT | Passport          |\n      | DNI      | National ID       |\n\n  Scenario: Create a new document type successfully\n    When I create a document type with the following details:\n      | code            | VISA             |\n      | name            | Visa Document    |\n      | description     | Temporary stay visa |\n      | validationRegex | ^V[0-9]{6,8}$    |\n      | active          | true             |\n    Then the document type should be created successfully\n    And the document type should have the code \"VISA\"\n    And the document type should be active\n\n  Scenario: Create document type with duplicate code\n    Given a document type with code \"PASSPORT\" already exists\n    When I create a new document type with code \"PASSPORT\"\n    Then the document type creation should fail\n    And I should receive an error about duplicate document type code\n\n  Scenario: Retrieve document type by code\n    Given a document type exists with the following details:\n      | code            | DNI              |\n      | name            | National ID      |\n      | description     | National identification card |\n      | validationRegex | ^[0-9]{7,10}$    |\n      | active          | true             |\n    When I request the document type by code \"DNI\"\n    Then I should receive the document type details\n    And the details should match the created document type\n\n  Scenario: Search document types by name\n    Given the following document types exist in the system:\n      | code     | name              | active |\n      | PASSPORT | Passport          | true   |\n      | LICENSE  | Driver License    | true   |\n      | OLDLIC   | Old License       | false  |\n    When I search for document types containing \"License\"\n    Then I should receive 2 document types\n    And the returned document types should be:\n      | code     | name              |\n      | LICENSE  | Driver License    |\n      | OLDLIC   | Old License       |\n\n  Scenario: List document types with pagination\n    Given there are 15 document types in the system\n    When I request document types with page size 5 and page number 2\n    Then I should receive 5 document types\n    And the response should indicate page 2 of 3 total pages\n    And the response should include pagination metadata","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/document-type/document-type.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Document Type Management","description":"  As a hotel/hostel staff member\n  I want to manage document types for guest identification\n  So that I can properly validate and store guest identification documents","children":[{"background":{"location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the system is running","id":"145b548e-2bc6-4bb4-b2a6-285ea29727ab"},{"location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the database is clean","id":"13085487-63f5-4a2c-9656-37b3cf9e7111"}],"id":"8003e6bc-c8ca-4c90-99e2-434c8a563571"}},{"scenario":{"location":{"line":10,"column":3},"tags":[],"keyword":"Scenario","name":"List all document types","description":"","steps":[{"location":{"line":11,"column":5},"keyword 3722,"nanos":118540000}}},{"testCaseFinished":{"testCaseStartedId":"96850f20-d4d1-4cc0-b165-9f7d739212ce","timestamp":{"seconds":1771193722,"nanos":118622000},"willBeRetried":false}},{"source":{"uri":"classpath:features/guest/guest-management.feature","data":"Feature: Guest Management\n  As a hotel/hostel staff member\n  I want to manage guest information\n  So that I can track customer details and provide personalized service\n\n  Background:\n    Given the system is running\n    And the database is clean\n\n  Scenario: Register a new guest successfully\n    When I create a new guest with the following details:\n      | firstName    | John           |\n      | lastName     | Doe            |\n      | email        | john@email.com |\n      | phone        | +1234567890    |\n      | dateOfBirth  | 1985-06-15     |\n      | nationality  | UNITED_STATES  |\n      | documentNumber | A12345678    |\n      | documentType | PASSPORT       |\n    Then the guest should be created successfully\n    And the guest should have a unique ID\n    And the guest creation event should be published\n\n  Scenario: Register guest with invalid email\n    When I create a new guest with invalid email \"invalid-email\"\n    Then the guest creation should fail\n    And I should receive a validation error about invalid email format\n\n  Scenario: Register duplicate guest\n    Given a guest exists with email \"existing@email.com\"\n    When I create a new guest with email \"existing@email.com\"\n    Then the guest creation should fail\n    And I should receive an error about duplicate email\n\n  Scenario: Retrieve guest information\n    Given a guest exists with the following details:\n      | firstName    | Jane           |\n      | lastName     | Smith          |\n      | email        | jane@email.com |\n      | phone        | +1987654321    |\n      | dateOfBirth  | 1990-03-20     |\n      | nationality  | CANADA         |\n      | documentNumber | B98765432    |\n      | documentType | PASS 1193722,"nanos":273820000}}},{"testCaseFinished":{"testCaseStartedId":"c78bb6c5-1b3d-49be-977f-17ce8c214ef7","timestamp":{"seconds":1771193722,"nanos":274003000},"willBeRetried":false}},{"source":{"uri":"classpath:features/reservation/filter-reservation.feature","data":"Feature: Filter Reservations\n  As a hotel manager  \n  I want to filter reservations by various criteria with pagination\n  So that I can efficiently manage and analyze booking data\n\n  Background:\n    Given the database is clean\n\n  Scenario: Filter reservations by status - CONFIRMED\n    Given the following guests exist:\n      | firstName | lastName | email                | phone         | dateOfBirth | nationality     | documentNumber | documentType |\n      | John      | Doe      | john@example.com     | +1234567890   | 1985-05-15  | UNITED_STATES  | A12345678      | PASSPORT     |\n      | Jane      | Smith    | jane@example.com     | +1234567891   | 1990-08-20  | CANADA         | B98765432      | PASSPORT     |\n      | Carlos    | Garcia   | carlos@example.com   | +1234567892   | 1988-03-10  | SPAIN          | C11223344      | PASSPORT     |\n    And the following room types exist:\n      | name         | description      | basePrice | maxOccupancy |\n      | Single Room  | Single bed room  | 100.00    | 1            |\n      | Double Room  | Double bed room  | 150.00    | 2            |\n    And the following rooms exist:\n      | number | roomType     | status    |\n      | 101    | Single Room  | AVAILABLE |\n      | 102    | Double Room  | AVAILABLE |\n      | 201    | Double Room  | AVAILABLE |\n    And the following reservations exist:\n      | guestEmail           | roomNumber | checkIn    | checkOut   | status      | source       | quotedAmount |\n      | john@example.com     | 101        | 2026-03-01 | 2026-03-05 | CONFIRMED   | DIRECT       | 400.00       |\n      | jane@example.com     | 102        | 2026-03-10 | 2026-03-15 | CONFIRMED   | BOOKING      | 750.00       |\n      | carlos@example.com   | 201        | 2026-03-08 | 2026-03-12 | CHECKED_IN  | HOSTELWORLD  | 600.00       |\n    When I filter reservations by status \"CONFIRMED\"\n    Then the response should be successful\n    And I should receive 2 reservations\n    And all returned reservations should have status \"CONFIRMED\"\n\n  Scenario: Filter reservations by status - CHECKED_IN\n    Given the following guests exist:\n      | firstName | lastName | email                | phone         | dateOfBirth | nationality     | documentNumber | documentType |\n      | John      | Doe      | john@example.com     | +1234567890   | 1985-05-15  | UNITED_STATES  | A12345678      | PASSPORT     |\n      | Jane      | Smith    | jane@example.com     | +1234567891   | 1990-08-20  | CANADA         | B98765432      | PASSPORT     |\n      | Carlos    | Garcia   | carlos@example.com   | +1234567892   | 1988-03-10  | SPAIN          | C11223344      | PASSPORT     |\n    And the following room types exist:\n      | name           | description         | basePrice | maxOccupancy |\n      | Single Room 2  | Single bed room 2   | 100.00    | 1            |\n      | Double Room 2  | Double bed room 2   | 150.00    | 2            |\n    And the following rooms exist:\n      | number | roomType       | status    |\n      | 101    | Single Room 2  | AVAILABLE |\n      | 102    | Double Room 2  | AVAILABLE |\n      | 201    | Double Room 2  | AVAILABLE |\n    And the following reservations exist:\n      | guestEmail           | roomNumber | checkIn    | checkOut   | status      | source       | quotedAmount |\n      | john@example.com     | 101        | 2026-03-01 | 2026-03-05 | CHECKED_IN  | DIRECT       | 400.00       |\n      | jane@example.com     | 102        | 2026-03-10 | 2026-03-15 | CHECKED_IN  | BOOKING      | 750.00       |\n      | carlos@example.com   | 201        | 2026-03-08 | 2026-03-12 | CONFIRMED   | HOSTELWORLD  | 600.00       |\n    When I filter reservations by status \"CHECKED_IN\"\n    Then the response should be successful\n    And I should receive 2 reservations\n    And all returned reservations should have status \"CHECKED_IN\"\n\n  @ignore\n  Scenario: Filter reservations by source - BOOKING\n    Given the following reservations exist:\n      | guestEmail           | roomNumber | checkIn    | checkOut   | status      | source       | quotedAmount |\n      | john@example.com     | 101        | 2026-03-01 | 2026-03-05 | CONFIRMED   | DIRECT       | 400.00       |\n      | jane@example.com     | 102        | 2026-03-10 | 2026-03-15 | CONFIRMED   | BOOKING      | 750.00       |\n      | carlos@example.com   | 201        | 2026-03-08 | 2026-03-12 | CHECKED_IN  | BOOKING      | 600.00       |\n      | emma@example.com     | 301        | 2026-03-20 | 2026-03-25 | PENDING     | HOSTELWORLD  | 1500.00      |\n    When I filter reservations by source \"BOOKING\"\n    Then the response should be successful\n    And I should receive 2 reservations\n    And all returned reservations should have source \"BOOKING\"\n\n  @ignore\n  Scenario: Filter reservations by source - DIRECT\n    Given the following reservations exist:\n      | guestEmail           | roomNumber | checkIn    | checkOut   | status      | source       | quotedAmount |\n      | john@example.com     | 101        | 2026-03-01 | 2026-03-05 | CONFIRMED   | DIRECT       | 400.00       |\n      | jane@example.com     | 102        | 2026-03-10 | 2026-03-15 | CONFIRMED   | BOOKING      | 750.00       |\n      | carlos@example.com   | 201        | 2026-03-08 | 2026-03-12 | CHECKED_IN  | DIRECT       | 600.00       |\n    When I filter reservations by source \"DIRECT\"\n    Then the response should be successful\n    And I should receive 2 reservations\n    And all returned reservations should have source \"DIRECT\"\n\n  @ignore\n  Scenario: Filter reservations by stay (check-in date)\n    Given the following reservations exist:\n      | guestEmail           | roomNumber | checkIn    | checkOut   | status      | source       | quotedAmount |\n      | john@example.com     | 101        | 2026-03-01 | 2026-03-05 | CONFIRMED   | DIRECT       | 400.00       |\n      | jane@example.com     | 102        | 2026-03-10 | 2026-03-15 | CONFIRMED   | BOOKING      | 750.00       |\n      | carlos@example.com   | 201        | 2026-03-08 | 2026-03-12 | CHECKED_IN  | HOSTELWORLD  | 600.00       |\n      | emma@example.com     | 301        | 2026-04-01 | 2026-04-05 | CONFIRMED   | AIRBNB       | 1500.00      |\n    When I filter reservations by check-in date from \"2026-03-01\" to \"2026-03-31\"\n    Then the response should be successful\n    And I should receive 3 reservations\n    And all returned reservations should have check-in dates between \"2026-03-01\" and \"2026-03-31\"\n\n  @ignore\n  Scenario: Filter reservations by stay (overlapping dates)\n    Given the following reservations exist:\n      | guestEmail           | roomNumber | checkIn    | checkOut   | status      | source       | quotedAmount |\n      | john@example.com     | 101        | 2026-03-01 | 2026-03-05 | CONFIRMED   | DIRECT       | 400.00       |\n      | jane@example.com     | 102        | 2026-03-10 | 2026-03-15 | CONFIRMED   | BOOKING      | 750.00       |\n      | carlos@example.com   | 201        | 2026-03-08 | 2026-03-12 | CHECKED_IN  | HOSTELWORLD  | 600.00       |\n      | emma@example.com     | 301        | 2026-03-20 | 2026-03-25 | CONFIRMED   | AIRBNB       | 1500.00      |\n    When I filter reservations overlapping with dates \"2026-03-09\" to \"2026-03-13\"\n    Then the response should be successful\n    And I should receive 2 reservations\n\n  @ignore\n  Scenario: Filter reservations with combined filters - status and source\n    Given the following reservations exist:\n      | guestEmail           | roomNumber | checkIn    | checkOut   | status      | source       | quotedAmount |\n      | john@example.com     | 101        | 2026-03-01 | 2026-03-05 | CONFIRMED   | DIRECT       | 400.00       |\n      | jane@example.com     | 102        | 2026-03-10 | 2026-03-15 | CONFIRMED   | BOOKING      | 750.00       |\n      | carlos@example.com   | 201        | 2026-03-08 | 2026-03-12 | CONFIRMED   | BOOKING      | 600.00       |\n      | emma@example.com     | 301        | 2026-03-20 | 2026-03-25 | CHECKED_IN  | BOOKING      | 1500.00      |\n    When I filter reservations by status \"CONFIRMED\" and source \"BOOKING\"\n    Then the response should be successful\n    And I should receive 2 reservations\n    And all returned reservations should have status \"CONFIRMED\"\n    And all returned reservations should have source \"BOOKING\"\n\n  @ignore\n  Scenario: Filter reservations with pagination - first page\n    Given there are 15 reservations in the system\n    When I filter reservations with page size 5 and page number 1\n    Then the response should be successful\n    And I should receive 5 reservations\n    And the reservation response should indicate page 1 of 3 total pages\n    And the reservation response should include pagination metadata\n\n  @ignore\n  Scenario: Filter reservations with pagination - second page\n    Given there are 15 reservations in the system\n    When I filter reservations with page size 5 and page number 2\n    Then the response should be successful\n    And I should receive 5 reservations\n    And the reservation response should indicate page 2 of 3 total pages\n    And the reservation response should include pagination metadata\n\n  @ignore\n  Scenario: Filter reservations with pagination - last page\n    Given there are 15 reservations in the system\n    When I filter reservations with page size 5 and page number 3\n    Then the response should be successful\n    And I should receive 5 reservations\n    And the reservation response should indicate page 3 of 3 total pages\n    And the reservation response should include pagination metadata\n\n  @ignore\n  Scenario: Filter reservations by status with pagination\n    Given the following 12 reservations exist with status:\n      | count | status     |\n      | 8     | CONFIRMED  |\n      | 4     | CHECKED_IN |\n    When I filter reservations by status \"CONFIRMED\" with page size 3 and page number 1\n    Then the response should be successful\n    And I should receive 3 reservations\n    And the reservation response should indicate page 1 of 3 total pages\n    And all returned reservations should have status \"CONFIRMED\"\n\n  @ignore\n  Scenario: Filter reservations with no results\n    Given the following reservations exist:\n      | guestEmail           | roomNumber | checkIn    | checkOut   | status      | source       | quotedAmount |\n      | john@example.com     | 101        | 2026-03-01 | 2026-03-05 | CONFIRMED   | DIRECT       | 400.00       |\n      | jane@example.com     | 102        | 2026-03-10 | 2026-03-15 | CONFIRMED   | BOOKING      | 750.00       |\n    When I filter reservations by status \"CANCELLED\"\n    Then the response should be successful\n    And I should receive 0 reservations\n\n  @ignore  \n  Scenario: Filter reservations with invalid status\n    When I filter reservations by status \"INVALID_STATUS\"\n    Then the response should fail with status code 400\n\n  @ignore\n  Scenario: Filter reservations with invalid source\n    When I filter reservations by source \"INVALID_SOURCE\"\n    Then the response should fail with status code 400\n\n  @ignore\n  Scenario: Filter reservations with invalid pagination parameters\n    When I filter reservations with page size -1 and page number 1\n    Then the response should fail with status code 400\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/reservation/filter-reservation.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Filter Reservations","description":"  As a hotel manager  \n  I want to filter reservations by various criteria with pagination\n  So that I stCaseStartedId":"ecc912cf-eb09-4b65-97c5-80a6192fcd77","testStepId":"890cb7b7-9b28-4f96-b896-3c94d8eed615","testStepResult":{"duration":{"seconds":0,"nanos":263000},"status":"PASSED"},"timestamp":{"seconds":1771193722,"nanos":448361000}}},{"testCaseFinished":{"testCaseStartedId":"ecc912cf-eb09-4b65-97c5-80a6192fcd77","timestamp":{"seconds":1771193722,"nanos":448767000},"willBeRetried":false}},{"source":{"uri":"classpath:features/reservation/reservation-management.feature","data":"Feature: Reservation Management\n  As a hotel/hostel staff member\n  I want to manage reservations\n  So that I can handle guest bookings and room occupancy\n\n  Background:\n    Given the system is running\n    And the database is clean\n    And the following room types exist:\n      | name     | description      | basePrice | maxOccupancy |\n      | Single   | Single bed room  | 50.00     | 1            |\n      | Double   | Double bed room  | 80.00     | 2            |\n      | Dormitory| Shared dormitory | 25.00     | 6            |\n    And the following rooms exist:\n      | number | roomType  | status    |\n      | 101    | Single    | AVAILABLE |\n      | 102    | Double    | AVAILABLE |\n      | 201    | Dormitory | AVAILABLE |\n\n  Scenario: Create a new reservation successfully\n    Given a guest exists with email \"guest@email.com\"\n    When I create a reservation with the following details:\n      | guestEmail  | guest@email.com |\n      | checkIn     | 2026-03-01      |\n      | checkOut    | 2026-03-05      |\n      | roomNumber  | 101             |\n      | totalAmount | 200.00          |\n      | source      | DIRECT          |\n    Then the reservation should be created successfully\n    And the reservation should have a unique code\n    And the reservation status should be CONFIRMED\n    And the reservation creation event should be published\n\n  Scenario: Create reservation with invalid dates\n    Given a guest exists with email \"guest@email.com\"\n    When I create a reservation with check-out date before check-in date\n    Then the reservation creation should fail\n    And I should receive a validation error about invalid dates\n\n  Scenario: Create reservation for non-existent guest\n    When I create a reservation for non-existent guest \"nonexistent@email.com\"\n    Then the reservation creation should fail\n    And I should receive an error about guest not found\n\n  Scenario: Create reservation for unavailable room\n    Given a guest exists with email \"guest@email.com\"\n    And room \"101\" is occupied from \"2026-03-01\" to \"2026-03-05\"\n    When I create a reservation for room \"101\" from \"2026-03-02\" to \"2026-03-04\"\n    Then the reservation creation should fail\n    And I should receive an error about room availability\n\n  Scenario: Check-in a confirmed reservation\n    Given a guest exists with email \"checkin@email.com\"\n    And a confirmed reservation exists for the guest\n    When I check-in the reservation\n    Then the reservation status should be CHECKED_IN\n    And the check-in date should be recorded\n    And the room status should be OCCUPIED\n\n  Scenario: Check-out a checked-in reservation\n    Given a guest exists with email \"checkout@email.com\"\n    And a checked-in reservation exists for the guest\n    When I check-out the reservation\n    Then the reservation status should be CHECKED_OUT\n    And the check-out date should be recorded\n    And the room status should be AVAILABLE\n\n  Scenario: List reservations for a date range\n    Given a guest exists with email \"list@email.com\"\n    And the following reservations exist:\n      | guestEmail   | checkIn    | checkOut   | status    |\n      | list@email.com| 2026-03-01 | 2026-03-03 | CONFIRMED |\n      | list@email.com| 2026-03-10 | 2026-03-12 | CONFIRMED |\n      | list@email.com| 2026-04-01 | 2026-04-03 | CONFIRMED |\n    When I request reservations for March 2026\n    Then I should receive 2 reservations\n    And all reservations should be within the requested date range\n\n  Scenario: Calculate pricing based on stay duration\n    Given a guest exists with email \"pricing@email.com\"\n    When I create a reservation for 7 nights in a Single room\n    Then the system should apply long stay discount\n    And the total amount should reflect the discounted price","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/reservation/reservation-management.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Reservation Management","description":"  As a hotel/hostel staff member\n  I want to manage reservations\n  So that I can handle guest bookings and room occupancy","children":[{"background":{"location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the system is running","id":"c6fdda36-c459-43c7-a663-1d3323028fed"},{"location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the database is clean","id":"4d7bfdf9-7e37-45f5-a9d4-fe8d86167bf3"},{"location":{"line":9,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the following room types exist:","dataTable":{"location":{"line":10,"column":7},"rows":[{"location":{"line":10,"column":7},"cells":[{"location":{"line":10,"column":9},"value":"name"},{"location":{"line":10,"column":20},"value":"description"},{"location":{"line":10,"column":39},"value":"basePrice"},{"location":{"line":10,"column":51},"value":"maxOccupancy"}],"id":"72e5bdbc-f23b-4826-a7ca-4b86c18112ac"},{"location":{"line":11,"column":7},"cells":[{"location":{"line":11,"column":9},"value":"Single"},{"location":{"line":11,"column":20},"value":"Single bed room"},{"location":{"line":11,"column":39},"value":"50.00"},{"location":{"line":11,"column":51},"value":"1"}],"id":"24648004-cf71-474b-ba4c-246e0e30999b"},{"location":{"line":12,"column":7},"cells":[
