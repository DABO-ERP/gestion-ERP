window.CUCUMBER_MESSAGES = [{"meta":{"protocolVersion":"24.1.0","implementation":{"name":"cucumber-jvm","version":"7.18.0"},"runtime":{"name":"OpenJDK 64-Bit Server VM","version":"21.0.5+11-LTS"},"os":{"name":"Mac OS X"},"cpu":{"name":"aarch64"}}},{"testRunStarted":{"timestamp":{"seconds":1771187573,"nanos":788456000}}},{"source":{"uri":"classpath:features/document-type.feature","data":"Feature: Document Type Management\n  As a hotel/hostel staff member\n  I want to manage document types for guest identification\n  So that I can properly validate and store guest identification documents\n\n  Background:\n    Given the system is running\n    And the database is clean\n\n  Scenario: List all document types\n    Given the following document types exist in the system:\n      | code     | name              | description                    | validationRegex  | active |\n      | PASSPORT | Passport          | International travel document | ^[A-Z]{1,3}[0-9]{6,9}$ | true   |\n      | DNI      | National ID       | National identification card   | ^[0-9]{7,10}$    | true   |\n      | LICENSE  | Driver License    | Driving license document       | ^[A-Z0-9]{8,12}$ | true   |\n      | CEDULA   | Cédula            | Latin American ID card         | ^[0-9]{8,11}$    | true   |\n      | OLDID    | Deprecated ID     | Old identification type        | ^[0-9]{6}$       | false  |\n    When I request all document types\n    Then I should receive 5 document types\n    And the document types should include:\n      | code     | name              | active |\n      | PASSPORT | Passport          | true   |\n      | DNI      | National ID       | true   |\n      | LICENSE  | Driver License    | true   |\n      | CEDULA   | Cédula            | true   |\n      | OLDID    | Deprecated ID     | false  |\n    And each document type should have the required fields:\n      | field            |\n      | code             |\n      | name             |\n      | description      |\n      | validationRegex  |\n      | active           |\n\n  Scenario: List only active document types\n    Given the following document types exist in the system:\n      | code     | name              | active |\n      | PASSPORT | Passport          | true   |\n      | DNI      | National ID       | true   |\n      | OLDID    | Deprecated ID     | false  |\n    When I request only active document types\n    Then I should receive 2 document types\n    And all returned document types should be active\n    And the active document types should be:\n      | code     | name              |\n      | PASSPORT | Passport          |\n      | DNI      | National ID       |\n\n  Scenario: Create a new document type successfully\n    When I create a document type with the following details:\n      | code            | VISA             |\n      | name            | Visa Document    |\n      | description     | Temporary stay visa |\n      | validationRegex | ^V[0-9]{6,8}$    |\n      | active          | true             |\n    Then the document type should be created successfully\n    And the document type should have the code \"VISA\"\n    And the document type should be active\n\n  Scenario: Create document type with duplicate code\n    Given a document type with code \"PASSPORT\" already exists\n    When I create a new document type with code \"PASSPORT\"\n    Then the document type creation should fail\n    And I should receive an error about duplicate document type code\n\n  Scenario: Retrieve document type by code\n    Given a document type exists with the following details:\n      | code            | DNI              |\n      | name            | National ID      |\n      | description     | National identification card |\n      | validationRegex | ^[0-9]{7,10}$    |\n      | active          | true             |\n    When I request the document type by code \"DNI\"\n    Then I should receive the document type details\n    And the details should match the created document type\n\n  Scenario: Search document types by name\n    Given the following document types exist in the system:\n      | code     | name              | active |\n      | PASSPORT | Passport          | true   |\n      | LICENSE  | Driver License    | true   |\n      | OLDLIC   | Old License       | false  |\n    When I search for document types containing \"License\"\n    Then I should receive 2 document types\n    And the returned document types should be:\n      | code     | name              |\n      | LICENSE  | Driver License    |\n      | OLDLIC   | Old License       |\n\n  Scenario: List document types with pagination\n    Given there are 15 document types in the system\n    When I request document types with page size 5 and page number 2\n    Then I should receive 5 document types\n    And the response should indicate page 2 of 3 total pages\n    And the response should include pagination metadata","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/document-type.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Document Type Management","description":"  As a hotel/hostel staff member\n  I want to manage document types for guest identification\n  So that I can properly validate and store guest identification documents","children":[{"background":{"location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the system is running","id":"6f627375-0f44-444d-8196-f6de08ce60ae"},{"location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the database is clean","id":"dfc39835-4eef-4876-9948-e4ca67befa48"}],"id":"2ad0cd54-1bbd-4e40-b544-9acc4eabb0be"}},{"scenario":{"location":{"line":10,"column":3},"tags":[],"keyword":"Scenario","name":"List all document types","description":"","steps":[{"location":{"line":11,"column":5},"keyword":"Given ","keywordType":"Co  | 1990-03-20     |\n      | nationality  | CANADA         |\n      | documentNumber | B98765432    |\n      | documentType | PASSPORT       |\n    When I request the guest information by ID\n    Then I should receive the guest details\n    And the details should match the created guest\n\n  Scenario: List all guests\n    Given the following guests exist:\n      | firstName | lastName | email           |\n      | Alice     | Johnson  | alice@email.com |\n      | Bob       | Wilson   | bob@email.com   |\n      | Carol     | Brown    | carol@email.com |\n    When I request the list of all guests\n    Then I should receive 3 guests\n    And the list should contain all created guests\n\n  Scenario: Update guest contact information\n    Given a guest exists with email \"update@email.com\"\n    When I update the guest's contact information:\n      | email | newemail@email.com |\n      | phone | +1555000123        |\n    Then the guest's contact information should be updated\n    And the new information should be persisted","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/guest/guest-management.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Guest Management","description":"  As a hotel/hostel staff member\n  I want to manage guest information\n  So that I can track customer details and provide personalized service","children":[{"background":{"location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the system is running","id":"d4da692a-9b67-48a1-a248-bdaabe323732"},{"location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the database is clean","id":"6eb16e40-8a8a-4dea-a30c-9a0b564fbdf8"}],"id":"01816374-a3d3-42eb-beb8-7383fbf4d79c"}},{"scenario":{"location":{"line":10,"column":3},"tags":[],"keyword":"Scenario","name":"Registe estStepResult":{"duration":{"seconds":0,"nanos":33000},"status":"SKIPPED"},"timestamp":{"seconds":1771187578,"nanos":492359000}}},{"testCaseFinished":{"testCaseStartedId":"939a23f6-6c4b-4216-92c7-e0243e8e7148","timestamp":{"seconds":1771187578,"nanos":492410000},"willBeRetried":false}},{"source":{"uri":"classpath:features/reservation-management.feature","data":"Feature: Reservation Management\n  As a hotel/hostel staff member\n  I want to manage reservations\n  So that I can handle guest bookings and room occupancy\n\n  Background:\n    Given the system is running\n    And the database is clean\n    And the following room types exist:\n      | name     | description      | basePrice | maxOccupancy |\n      | Single   | Single bed room  | 50.00     | 1            |\n      | Double   | Double bed room  | 80.00     | 2            |\n      | Dormitory| Shared dormitory | 25.00     | 6            |\n    And the following rooms exist:\n      | number | roomType  | status    |\n      | 101    | Single    | AVAILABLE |\n      | 102    | Double    | AVAILABLE |\n      | 201    | Dormitory | AVAILABLE |\n\n  Scenario: Create a new reservation successfully\n    Given a guest exists with email \"guest@email.com\"\n    When I create a reservation with the following details:\n      | guestEmail  | guest@email.com |\n      | checkIn     | 2026-03-01      |\n      | checkOut    | 2026-03-05      |\n      | roomNumber  | 101             |\n      | totalAmount | 200.00          |\n      | source      | WEBSITE         |\n    Then the reservation should be created successfully\n    And the reservation should have a unique code\n    And the reservation status should be CONFIRMED\n    And the reservation creation event should be published\n\n  Scenario: Create reservation with invalid dates\n    Given a guest exists with email \"guest@email.com\"\n    When I create a reservation with check-out date before check-in date\n    Then the reservation creation should fail\n    And I should receive a validation error about invalid dates\n\n  Scenario: Create reservation for non-existent guest\n    When I create a reservation for non-existent guest \"nonexistent@email.com\"\n    Then the reservation creation should fail\n    And I should receive an error about guest not found\n\n  Scenario: Create reservation for unavailable room\n    Given a guest exists with email \"guest@email.com\"\n    And room \"101\" is occupied from \"2026-03-01\" to \"2026-03-05\"\n    When I create a reservation for room \"101\" from \"2026-03-02\" to \"2026-03-04\"\n    Then the reservation creation should fail\n    And I should receive an error about room availability\n\n  Scenario: Check-in a confirmed reservation\n    Given a guest exists with email \"checkin@email.com\"\n    And a confirmed reservation exists for the guest\n    When I check-in the reservation\n    Then the reservation status should be CHECKED_IN\n    And the check-in date should be recorded\n    And the room status should be OCCUPIED\n\n  Scenario: Check-out a checked-in reservation\n    Given a guest exists with email \"checkout@email.com\"\n    And a checked-in reservation exists for the guest\n    When I check-out the reservation\n    Then the reservation status should be CHECKED_OUT\n    And the check-out date should be recorded\n    And the room status should be AVAILABLE\n\n  Scenario: List reservations for a date range\n    Given a guest exists with email \"list@email.com\"\n    And the following reservations exist:\n      | guestEmail   | checkIn    | checkOut   | status    |\n      | list@email.com| 2026-03-01 | 2026-03-03 | CONFIRMED |\n      | list@email.com| 2026-03-10 | 2026-03-12 | CONFIRMED |\n      | list@email.com| 2026-04-01 | 2026-04-03 | CONFIRMED |\n    When I request reservations for March 2026\n    Then I should receive 2 reservations\n    And all reservations should be within the requested date range\n\n  Scenario: Calculate pricing based on stay duration\n    Given a guest exists with email \"pricing@email.com\"\n    When I create a reservation for 7 nights in a Single room\n    Then the system should apply long stay discount\n    And the total amount should reflect the discounted price","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/reservation-management.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Reservation Management","description":"  As a hotel/hostel staff member\n  I want to manage reservations\n  So that I can handle guest bookings and room occupancy","children":[{"background":{"location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the system is running","id":"f5f0e9e2-6d6e-49a4-bc6b-b758ca973529"},{"location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the database is clean","id":"8267280f-4e2b-4abd-a8bd-f20cc02c69d8"},{"location":{"line":9,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the following room types exist:","dataTable":{"location":{"line":10,"column":7},"rows":[{"location":{"line":10,"column":7},"cells":[{"location":{"line":10,"column":9},"value":"name"},{"location":{"line":10,"column":20},"value":"description"},{"location":{"line":10,"column":39},"value":"basePrice"},{"location":{"line":10,"column":51},"value":"maxOccupancy"}],"id":"e8255900-a8a8-48f3-8aed-9154bf7c3151"},{"location":{"line":11,"column":7},"cells":[{"location":{"line":11,"column":9},"value":"Single"},{"location":{"line":11,"column":20},"value":"Single bed room"},{"location":{"line":11,"column":39},"value":"50.00"},{"location":{"line":11,"column":51},"value":"1"}],"id":"571de72e-8123-45b7-b7ec-1ec0b04d936b"},{"location":{"line":12,"column":7},"cells":[{"location":{"line":12,"column":9},"value":"Double"},{"location":{"line":12,"column":20},"value":"Double bed room"},{"location":{"line
